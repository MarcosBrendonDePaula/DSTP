services:
  dstp:
    image: marcosbrendon/mbp-svc:latest
    pull_policy: always
    container_name: dstp-panel
    restart: always
    # Run as root so the SQLite data volume (owned by root) is writable.
    # Matches the pattern used by the other panels on this host.
    user: "0:0"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
      CORS_ORIGINS: "https://dstp.marcosbrendon.com"
      CORS_CREDENTIALS: "true"
    volumes:
      - dstp-data:/app/data
    labels:
      - "traefik.enable=true"
      # HTTPS router (direct access + Cloudflare Full mode)
      - "traefik.http.routers.dstp.rule=Host(`dstp.marcosbrendon.com`)"
      - "traefik.http.routers.dstp.entrypoints=websecure"
      - "traefik.http.routers.dstp.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dstp.service=dstp"
      # HTTP router (Cloudflare proxied with Flexible SSL connects on :80)
      - "traefik.http.routers.dstp-web.rule=Host(`dstp.marcosbrendon.com`)"
      - "traefik.http.routers.dstp-web.entrypoints=web"
      - "traefik.http.routers.dstp-web.service=dstp"
      - "traefik.http.services.dstp.loadbalancer.server.port=3000"
    networks:
      - traefik-network

networks:
  traefik-network:
    external: true

volumes:
  dstp-data:
