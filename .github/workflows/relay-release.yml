# Build the standalone DSTP relay binaries (Windows / Linux / macOS) and
# attach them to a GitHub Release as raw executables.
#
# The relay has no dependencies — it's a single Bun script compiled to a
# self-contained executable. Each binary is self-sufficient: download the one
# for your OS and run it directly.
#
# Triggers:
#   - push of a tag like v1.2.3
#   - manual (workflow_dispatch) with a tag input

name: Release Relay Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0). Required for manual runs."
        required: true
        type: string

env:
  BUN_VERSION: "1.3.12"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create the GitHub Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun ${{ env.BUN_VERSION }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "value=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Releasing relay: ${TAG}"

      - name: Build relay binaries (win/linux/mac)
        working-directory: relay
        run: bun run build:all

      - name: List built binaries
        working-directory: relay
        run: ls -la dist/dstp-relay.exe dist/dstp-relay-linux dist/dstp-relay-mac

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: Relay ${{ steps.tag.outputs.value }}
          body: |
            DSTP relay standalone binaries.

            Download the executable for your OS and run it directly. Configure
            via env vars (DSTP_UPSTREAM / DSTP_PORT / DSTP_TOKEN) or a
            `dstp-relay.config.json` placed next to the binary — see relay/README.md.

            - Windows: `dstp-relay.exe`
            - Linux:   `dstp-relay-linux`
            - macOS:   `dstp-relay-mac`
          files: |
            relay/dist/dstp-relay.exe
            relay/dist/dstp-relay-linux
            relay/dist/dstp-relay-mac
          fail_on_unmatched_files: true
